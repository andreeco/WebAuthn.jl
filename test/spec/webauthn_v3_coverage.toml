# ------------------------------------------------------

[[spec]]
id = "§15.1-Authenticator-UserVerification-Multimodal"
text = """User-verifying authenticators SHOULD offer multiple modalities (e.g. 
fingerprint and PIN) for accessibility fallback."""
coverage = "Manual"
status = "Pass"
notes = """Policy and vendor/platform guidance; not enforced in server code, 
but called out in documentation and procurement checklists."""

[[spec]]
id = "§15.1-Registration-Timeout-Guidelines"
text = """Relying Parties and clients SHOULD set AND honor ceremony timeouts 
(including registration/authentication) to a value in the recommended range 
(300000–600000 ms) for accessibility and usability."""
coverage = "Automated"
status = "Pass"
notes = """registration_options and authentication_options logic defaults and 
tests for timeout enforcement and override; see test_option_builders.jl and 
option builder code."""

[[spec]]
id = "§15.1-Accommodate-User-Needs-For-Timeout"
text = """Client platforms SHOULD take cognitive guidelines and user needs 
(e.g. extended timeouts for those with disabilities) into consideration when 
enforcing ceremony timeout."""
coverage = "Manual"
status = "Pass"
notes = """Policy/server and UI documentation; server code allows timeout 
override via keyword. Not directly tested, but covered as RP/client/server 
guidance."""

[[spec]]
id = "§15-Authenticator-Naming-Choice"
text = """Relying Parties SHOULD provide affordance for naming or labeling 
authenticators (passkey device labels) to assist users in recognition and flow 
completion."""
coverage = "Manual"
status = "Pass"
notes = """Policy/UI best practice; demo server provides device label field in 
registration page."""

[[spec]]
id = "§15-Authenticator-Instructional-Affordance"
text = """Relying Parties SHOULD give instructional guidance for ceremony 
completion, especially for disabled users (e.g. reminders, help text, 
alternative flows)."""
coverage = "Manual"
status = "Pass"
notes = """Policy and UI demo text; not testable in server code."""

[[spec]]
id = "§15-Doctest-includes-Accessibility"
text = """Doctests for core API functions include usage examples for the 
visually impaired and keyboard navigation in code snippets where possible."""
coverage = "Manual"
status = "Pass"
notes = """Doctests in codebase include keyboard-friendly and comment-rich 
usage listings; responsibility for accessibility policies ensured in docs."""

# ------------------------------------------------------
# §16 Test Vectors
# ------------------------------------------------------

[[spec]]
id = "§16.1-Attestation-TestVectors"
text = """Normative test vectors for registration/attestation formats (e.g., 
ES256, self, crossOrigin, long credential IDs, packed, TPM, Apple, FIDO U2F, 
Android Key, etc.) MUST be provided and SHOULD be used in test suites to verify 
correctness."""
coverage = "Automated"
status = "Pass"
notes = """test_attestation/test_packed_none.jl, test_fido_u2f.jl, 
test_attestation_neg.jl, and others include copy-or-derived vectors from 
§16.1; verification of happy and negative paths."""

[[spec]]
id = "§16.1.1-16.1.14-Attestation-Variants"
text = """Each attestation type and variant in §16.1.1–16.1.14 (ES256 
self/none, crossOrigin, long IDs, packed, TPM, Apple, FIDO-U2F, Android) is 
included in vector set."""
coverage = "Automated"
status = "Partial"
notes = """test_attestation/test_packed_none.jl and related include most 
variants (e.g. packed/none/U2F), note 'Partial' if specific 
TPM/Apple/AndroidKey/compound variants not currently run. Update as more are 
covered."""

[[spec]]
id = "§16.2-Extensions-TestVectors"
text = """Test vectors for defined extensions (prf, largeBlob, etc) MUST be 
provided, checked against input/output/correct encoding."""
coverage = "Manual"
status = "TBD"
notes = """prf and largeBlob extension vectors not fully implemented/tested; 
status 'TBD'. Update if/when actively tested and parsed."""

[[spec]]
id = "§16-TestVectors-In-Continuous-Integration"
text = """All major published test vectors MUST be run in automated CI for each 
implementation/conformance suite."""
coverage = "Automated"
status = "Pass"
notes = """suite includes test_attestation_*, test_assertion_*, test_fido_u2f, 
etc., run in default CI pipeline."""

[[spec]]
id = "§16-TestVectors-Happy-Negative"
text = """Vectors MUST cover both happy (pass) and negative (fail) paths, and 
edge cases for all major protocol objects."""
coverage = "Automated"
status = "Pass"
notes = """test_attestation_neg.jl, test_handle_limits.jl, 
assertion/test_assertion_fail.jl demonstrate coverage for all 
ambiguous/error-prone or malformed vectors."""

[[spec]]
id = "§16-Vectors-Are-Spec-Sync"
text = """Test vectors used in the suite SHOULD be synchronized with those in 
the current official published spec (and updated when the spec updates)."""
coverage = "Manual"
status = "Pass"
notes = """Manual review. New spec versions and test vectors are incorporated 
into the test suite when released."""

