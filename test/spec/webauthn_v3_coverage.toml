# --------------------------------------------------------------------
# WebAuthn Spec Coverage Mapping
# Each entry links a normative spec paragraph (SPEC_ID) to a test.
#
# Fields:
#   id        : Unique spec paragraph ID (e.g. §6.1-UP-Flag)
#   text      : Spec requirement (summary, not full spec text)
#   coverage  : One of "Automated", "Manual", or "Interop"
#   status    : One of "Pass", "Fail", "Partial", "TBD"
#   notes     : Points to testset/file, comment, or purpose
#
# Allowed values:
#   coverage: "Automated" | "Manual" | "Interop" 
#   # (Automated = CI runs, Manual = by human, Interop = external/test)
#   status  : "Pass" | "Fail" | "Partial" | "TBD"
#   # (TBD = test not complete yet)
# 
# Example:
#   [[spec]]
#   id = "§6.1-UP-Flag" # SPEC_ID: §6.1-UP-Flag
#   text = "AuthenticatorData must set UP flag"
#   coverage = "Automated"
#   status = "Pass"
#   notes = "test_authdata.jl"
# --------------------------------------------------------------------

# [[spec]]
# id = "§6.1-UP-Flag" # SPEC_ID: §6.1-UP-Flag
