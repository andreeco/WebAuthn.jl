# ------------------------------------------------------
# §13 Security Considerations
# ------------------------------------------------------

[[spec]]
id = "§13.1-CredentialID-Unsigned"
text = """Credential IDs in assertion are not signed; verification logic MUST 
rely on valid signature, not on credentialId authenticity alone."""
coverage = "Automated"
status = "Pass"
notes = """test_assertion_pass.jl and fail.jl: matches credentialId to expected 
public key and checks cryptographic validation, not only id."""

[[spec]]
id = "§13.2-PhysicalProximity"
text = """Security assumptions require physical proximity of roaming 
authenticators, direct client communication; implementers MUST NOT enable 
untrusted remote mediation."""
coverage = "Manual"
status = "Pass"
notes = """Code/pathway review only; policy enforced by platform/RP/server 
design, see demo/interop docs."""

[[spec]]
id = "§13.3.1-AttestationCertificate-Hierarchy"
text = """Authenticators and manufacturers are RECOMMENDED to use a three-level 
certificate hierarchy; new models SHOULD use unique attestation certificates 
with AAGUID extension."""
coverage = "Manual"
status = "Pass"
notes = """X.509 manual certificate review/documentation, checked in 
attestation test vectors if available."""

[[spec]]
id = "§13.3.2-AttestationCertificate-CA-Compromise"
text = """On attestation CA compromise, device keys are still protected but 
certificates are distrusted; new certificates must be provisioned, and RPs MUST 
remove trust for old ones."""
coverage = "Manual"
status = "Pass"
notes = """Policy/procedural review; document expectation that certificate CA 
compromise triggers RP/CA action. No dynamic test."""

[[spec]]
id = "§13.4.1-RelyingParty-Benefits"
text = """Following registration/authentication requirements in §7 confers 
major security, including phishing resistance and cryptographic proof of 
possession."""
coverage = "Automated"
status = "Pass"
notes = """Entire happy path automated tests in test_option_builders, 
test_attestation/test_packed_none.jl, test_assertion_pass.jl (demonstrating 
security benefit)."""

[[spec]]
id = "§13.4.2-Embedded-Visibility-UI-Redressing"
text = """Relying Party using WebAuthn in an embedded context (e.g. iframes) 
SHOULD protect against UI redressing/clickjacking."""
coverage = "Manual"
status = "Pass"
notes = """Check server and demo UI include relevant policy (X-Frame-Options, 
CSP); manual policy, not automated."""

[[spec]]
id = "§13.4.3-Cryptographic-Challenges"
text = """Relying Parties MUST use random, unpredictable challenge in all 
ceremonies (≥16 bytes); matching must be verified by the server."""
coverage = "Automated"
status = "Pass"
notes = """test_challenge.jl; demo and 
registration_options/authentication_options logic. Negative case in 
test_assertion_fail.jl."""

[[spec]]
id = "§13.4.4-Attestation-Limitations"
text = """RP MUST NOT treat attestation as proof of channel security or 
physical authenticator, only as proof that the credential public key comes from 
a known class of authenticators."""
coverage = "Manual"
status = "Pass"
notes = """Policy and docstring warning; not testable but reviewed as design 
constraint."""

[[spec]]
id = "§13.4.5-Revoked-Attestation-Certificates"
